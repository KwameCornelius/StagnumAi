name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel any in-progress run for the same ref when a new commit lands.
# Without this, force-pushes pile up runs we'll never look at.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Type-check, lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Build needs the public Supabase env vars to resolve `import.meta.env`
          # references. CI uses placeholders — the actual build artefact is for
          # validation only, not deployment.
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder
